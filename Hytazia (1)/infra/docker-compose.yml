version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hytazia
      POSTGRES_USER: hytazia
      POSTGRES_PASSWORD: hytazia_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - 5432:5432
  redis:
    image: redis:7
    ports:
      - 6379:6379
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://hytazia:hytazia_pass@postgres:5432/hytazia
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - 4000:4000
  frontend:
    build: ./frontend
    ports:
      - 3000:3000
    depends_on:
      - backend

volumes:
  pgdata:
